[transcription]
provider = "whisper-cpp"
model = "small.en"

[llm]
enabled = false
provider = "groq"
model = "llama-3.3-70b-versatile"

[llm.post_processing]
remove_stutters = true
add_punctuation = true
fix_grammar = true
remove_filler_words = true

[recording]
sample_rate = 16000
channels = 1
format = "s16"
buffer_size = 8192
channel_buffer_size = 30
timeout = "5m"

[notifications]
enabled = true
type = "desktop"

[injection]
backends = ["wtype", "clipboard"]
ydotool_timeout = "5s"
wtype_timeout = "5s"
clipboard_timeout = "3s"
